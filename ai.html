<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 10px; }
        .controls { margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <h1>Pong: First to 3</h1>
    <canvas id="pong" width="800" height="400"></canvas>
    <div class="controls">Use <b>Up</b> and <b>Down</b> arrows to move</div>

<script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");

    // Game Objects
    const ball = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 10,
        speed: 5,
        velocityX: 5,
        velocityY: 5,
        color: "WHITE"
    };

    const user = {
        x: 0, 
        y: (canvas.height - 100) / 2,
        width: 10,
        height: 100,
        score: 0,
        color: "WHITE"
    };

    const com = {
        x: canvas.width - 10,
        y: (canvas.height - 100) / 2,
        width: 10,
        height: 100,
        score: 0,
        color: "WHITE"
    };

    const net = {
        x: (canvas.width - 2) / 2,
        y: 0,
        height: 10,
        width: 2,
        color: "WHITE"
    };

    // Input Handling
    let upPressed = false;
    let downPressed = false;

    window.addEventListener("keydown", (e) => {
        if(e.key === "ArrowUp") upPressed = true;
        if(e.key === "ArrowDown") downPressed = true;
    });

    window.addEventListener("keyup", (e) => {
        if(e.key === "ArrowUp") upPressed = false;
        if(e.key === "ArrowDown") downPressed = false;
    });

    // Drawing Functions
    function drawRect(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
    }

    function drawArc(x, y, r, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2, true);
        ctx.closePath();
        ctx.fill();
    }

    function drawNet() {
        for(let i = 0; i <= canvas.height; i += 15) {
            drawRect(net.x, net.y + i, net.width, net.height, net.color);
        }
    }

    function drawText(text, x, y) {
        ctx.fillStyle = "#FFF";
        ctx.font = "75px Arial";
        ctx.fillText(text, x, y);
    }

    // Logic Functions
    function collision(b, p) {
        p.top = p.y;
        p.bottom = p.y + p.height;
        p.left = p.x;
        p.right = p.x + p.width;

        b.top = b.y - b.radius;
        b.bottom = b.y + b.radius;
        b.left = b.x - b.radius;
        b.right = b.x + b.radius;

        return p.left < b.right && p.top < b.bottom && p.right > b.left && p.bottom > b.top;
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.speed = 5;
        ball.velocityX = -ball.velocityX; // Send to the winner
    }

    function update() {
        // Score check
        if(ball.x - ball.radius < 0) {
            com.score++;
            resetBall();
        } else if(ball.x + ball.radius > canvas.width) {
            user.score++;
            resetBall();
        }

        // Move ball
        ball.x += ball.velocityX;
        ball.y += ball.velocityY;

        // Computer AI (Simple follow with a speed limit)
        com.y += (ball.y - (com.y + com.height/2)) * 0.1;

        // User Movement
        if(upPressed && user.y > 0) user.y -= 8;
        if(downPressed && user.y < canvas.height - user.height) user.y += 8;

        // Wall Bounce
        if(ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
            ball.velocityY = -ball.velocityY;
        }

        // Paddle Collision
        let player = (ball.x + ball.radius < canvas.width / 2) ? user : com;

        if(collision(ball, player)) {
            // Speed increase each hit
            ball.speed += 0.5;

            // Bounce angle logic
            let collidePoint = (ball.y - (player.y + player.height / 2));
            collidePoint = collidePoint / (player.height / 2);
            let angleRad = (Math.PI / 4) * collidePoint;

            let direction = (ball.x + ball.radius < canvas.width / 2) ? 1 : -1;
            ball.velocityX = direction * ball.speed * Math.cos(angleRad);
            ball.velocityY = ball.speed * Math.sin(angleRad);
        }
    }

    function render() {
        // Clear canvas
        drawRect(0, 0, canvas.width, canvas.height, "#000");

        // Check for winner
        if (user.score >= 3 || com.score >= 3) {
            ctx.font = "45px Arial";
            ctx.fillStyle = "WHITE";
            let winner = user.score >= 3 ? "You Win!" : "You Lose!";
            ctx.fillText(winner, canvas.width/4, canvas.height/2);
            ctx.font = "20px Arial";
            ctx.fillText("Refresh to play again", canvas.width/3 + 30, canvas.height/2 + 50);
            return;
        }

        drawNet();
        drawText(user.score, canvas.width / 4, canvas.height / 5);
        drawText(com.score, 3 * canvas.width / 4, canvas.height / 5);
        drawRect(user.x, user.y, user.width, user.height, user.color);
        drawRect(com.x, com.y, com.width, com.height, com.color);
        drawArc(ball.x, ball.y, ball.radius, ball.color);
    }

    function game() {
        update();
        render();
    }

    const framePerSecond = 50;
    let loop = setInterval(game, 1000 / framePerSecond);
</script>
</body>
</html>
